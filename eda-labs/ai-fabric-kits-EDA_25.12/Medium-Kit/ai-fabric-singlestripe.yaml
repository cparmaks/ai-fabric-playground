name: ai-fabric-singlestripe
prefix: ""

mgmt:
  network: mgmt-net2
  ipv4-subnet: 172.16.2.0/24

topology:
  kinds:
    nokia_srlinux:
      image: ghcr.io/nokia/srlinux:25.10.1
      type: ixrh4
    linux:
      image: ghcr.io/srl-labs/network-multitool
      type: linux
      binds:
        - gpu-base-configs:/config

  nodes:

    # AI leaf H4 Switches - 8 switches in leaf configuration
    singlestripe-leaf-01:
      kind: nokia_srlinux
      mgmt-ipv4: 172.16.2.11
      # binds:
      #   - ./srl-configs/leaf-01.cfg:/home/admin/leaf-01.cfg
      labels:
        topoViewer-role: leaf
        topoViewer-group: "Data Center Stripe01"
        topoViewer-groupLevel: 2
        graph-posX: "-100"
        graph-posY: "258"
        graph-group: Data Center Stripe01
        graph-level: "2"
        graph-groupLabelPos: top-center
      image: ghcr.io/nokia/srlinux:25.10.1
      type: ixrh4

    singlestripe-leaf-02:
      kind: nokia_srlinux
      mgmt-ipv4: 172.16.2.12
